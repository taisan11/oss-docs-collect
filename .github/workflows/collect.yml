name: collect

on:
  schedule:
    - cron: "0 10,22 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun index.ts

      - run: |
          git add .
          git commit -m "update dataset" || echo "no changes"
          git push
